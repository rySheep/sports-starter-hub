<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>綜合體育狂熱樞紐 Sports Hub</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="hero-section">
        <div class="split left-f1">
            <div class="content">
                <h1>F1 賽車</h1>
                <p>極速與頂尖工藝的殿堂，感受引擎的嘶吼。</p>
                <button class="btn f1-btn" onclick="enterSport('f1')">進入 F1 專區</button>
            </div>
        </div>
        <div class="split right-mlb">
            <div class="content">
                <h1>MLB 棒球</h1>
                <p>百年的經典對決，體驗全壘打的熱血沸騰。</p>
                <button class="btn mlb-btn" onclick="enterSport('mlb')">進入 MLB 專區</button>
            </div>
        </div>
        <div class="scroll-indicator">
            <span>下滑探索更多</span>
            <div class="arrow">↓</div>
        </div>
    </header>
    <nav class="navbar">
        
        <div class="logo" onclick="window.scrollTo({ top: 0, behavior: 'smooth' })">🥇 Sports Hub</div>
        <div class="sport-selector" style="margin: 0 20px;">
            <button id="nav-btn-f1" onclick="enterSport('f1')">🏁 F1</button>
            <button id="nav-btn-mlb" onclick="enterSport('mlb')">⚾ MLB</button>
        </div>
        <div class="nav-links">
            <button id="tab-btn-wiki" class="active" onclick="switchTab('wiki')">歷史維基</button>
            <button id="tab-btn-article" onclick="switchTab('article')">科普專欄</button>
            <button id="tab-btn-quiz" onclick="switchTab('quiz')">小小測驗王</button>
            <button id="tab-btn-calendar" onclick="switchTab('calendar')">賽程行事曆</button>
        </div>
    </nav>

    <main id="main-content" class="container">
        <section id="wiki-tab" class="tab-content active">
            <h2 id="wiki-title">🏆 體育歷史維基</h2>
            <div id="wiki-display"></div>
        </section>

        <section id="article-tab" class="tab-content">
            </section>

        <section id="quiz-tab" class="tab-content">
            <h2 id="quiz-title">🧠 小小測驗王</h2>
            <div id="quiz-category-buttons" style="text-align: center; margin-bottom: 20px;"></div>
            <div id="quiz-display" class="card-container"></div>
        </section>

       <section id="calendar-tab" class="tab-content">
            </section>
    </main>

    <script src="main.js"></script>
</body>
</html>
