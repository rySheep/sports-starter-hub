<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新手體育村 | F1 & MLB</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="hero-section">
        <div class="split left-f1">
            <div class="content">
                <h1>F1 賽車</h1>
                <p>極速與頂尖工藝的殿堂，感受引擎的嘶吼。</p>
                <button class="btn f1-btn" onclick="enterSport('f1')">進入 F1 專區</button>
            </div>
        </div>
        <div class="split right-mlb">
            <div class="content">
                <h1>MLB 棒球</h1>
                <p>百年的經典對決，體驗全壘打的熱血沸騰。</p>
                <button class="btn mlb-btn" onclick="enterSport('mlb')">進入 MLB 專區</button>
            </div>
        </div>
        <div class="scroll-indicator">
            <span>下滑探索更多</span>
            <div class="arrow">↓</div>
        </div>
    </header>

    <div id="main-content">
        <nav class="navbar">
            <div class="logo">🥇 Sports Hub</div>
            <div class="sport-toggle">
                <button id="nav-btn-f1" onclick="setSport('f1')">🏎️ F1</button>
                <button id="nav-btn-mlb" onclick="setSport('mlb')">⚾ MLB</button>
            </div>
            <div class="nav-links">
                <button id="tab-btn-wiki" class="active" onclick="switchTab('wiki')">歷史維基</button>
                <button id="tab-btn-quiz" onclick="switchTab('quiz')">小小測驗王</button>
                <button id="tab-btn-article" onclick="switchTab('article')">科普專欄</button>
                <button id="tab-btn-calendar" onclick="switchTab('calendar')">賽程行事曆</button>
            </div>
        </nav>

        <main class="container">
            <section id="wiki-tab" class="tab-content active">
                <h2 id="wiki-title">🏆 體育歷史維基</h2>
                <div id="wiki-display" class="card-container">
                    </div>
            </section>

            <section id="quiz-tab" class="tab-content">
                <h2 id="quiz-title">🧠 小小測驗王</h2>
                <div id="quiz-display" class="card-container">
                     </div>
            </section>

            <section id="article-tab" class="tab-content">
                <h2>✍️ 體育科普專欄</h2>
                <div class="card"><p>專家正在努力趕稿中，敬請期待...</p></div>
            </section>
            <section id="calendar-tab" class="tab-content">
                <h2>📅 賽程行事曆</h2>
                <div class="card"><p>賽程系統建置中，準備為您轉換時區...</p></div>
            </section>
        </main>
    </div>

    <script src="main.js"></script>
</body>
</html>
